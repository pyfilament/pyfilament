apiVersion: batch/v1
kind: Job
metadata:
  name: pyfilament-run-migrations
spec:
  template:
    spec:
      containers:
        - name: run-migrations
          image: ghcr.io/pyfilament/pyfilament:latest
          env:
            - name: FILAMENT_DB_URI
              value: postgresql+asyncpg://postgres:postgres@pyfilament-psql:5432/pyfilament
          command: ["uv", "run", "alembic", "upgrade", "head"]
      restartPolicy: Never
  backoffLimit: 0
