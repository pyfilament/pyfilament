<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>pyfilament — durable async tasks</title>
    <style>
      :root{
        --paper:#faf9f6;--ink:#161311;--mut:#857d74;--line:#eae6df;--card:#fffdfb;
        --green:#0a9966;--green-d:#07835c;
        --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
        --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
      }
      *{box-sizing:border-box}
      body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.6;
        min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
        text-align:center;padding:40px 24px}
      a{text-decoration:none}
      .col{max-width:560px;width:100%}
      .mark{display:inline-flex;align-items:center;gap:9px;color:var(--mut);font-weight:700;letter-spacing:.02em;margin-bottom:42px;font-size:15px}
      .mark img{height:44px;width:auto;display:block}
      h1{font-size:clamp(30px,6.6vw,46px);line-height:1.05;letter-spacing:-1.6px;font-weight:820;margin:0;white-space:nowrap}
      h1 em{font-style:normal;color:var(--green-d)}
      .sub{font-size:17px;color:var(--mut);margin:18px auto 0;max-width:40ch}
      .sub em{font-style:normal;color:var(--green-d);font-weight:600}
      .code{background:var(--card);border:1px solid var(--line);border-radius:16px;text-align:left;margin:34px auto 0;max-width:480px;overflow:hidden;box-shadow:0 30px 60px -42px rgba(60,40,20,.5)}
      .code .h{display:flex;align-items:center;gap:7px;padding:13px 16px;border-bottom:1px solid var(--line)}
      .code .h i{width:11px;height:11px;border-radius:50%}
      .code .h .r{background:#ff5f57}.code .h .y{background:#febc2e}.code .h .g{background:#28c840}
      .code .h span{margin-left:8px;font-family:var(--mono);font-size:11.5px;color:var(--mut)}
      pre{margin:0;padding:16px 18px;font-family:var(--mono);font-size:13px;line-height:1.75;overflow-x:auto}
      .d{color:var(--green-d);font-weight:700}.k{color:#9a5cc7}.f{color:#2b7fb8}.c{color:#a59c91}.n{color:#c2722f}.kk{color:#9a5cc7}
      /* ── install: terminal footer INSIDE the code box ── */
      .cfoot{display:flex;align-items:center;gap:9px;padding:11px 16px;border-top:1px solid var(--line);
        background:#fbf7f3;font-family:var(--mono);font-size:12.5px;color:var(--ink);cursor:pointer;transition:background .12s}
      .cfoot:hover{background:#f6efe9}
      .cfoot .pr{color:var(--green-d);font-weight:700}
      .cfoot .cpy{margin-left:auto;display:inline-grid;place-items:center;color:var(--mut);transition:color .12s}
      .cfoot:hover .cpy{color:var(--green-d)}
      .cfoot .ick{display:none}
      .cfoot.copied .cpy{color:var(--green-d)}
      .cfoot.copied .icp{display:none}.cfoot.copied .ick{display:inline}
      .cta{display:flex;gap:12px;justify-content:center;margin-top:34px;flex-wrap:wrap}
      .btn{display:inline-flex;align-items:center;gap:9px;font-weight:700;font-size:14.5px;border-radius:999px;padding:12px 24px;transition:transform .12s}
      .btn:hover{transform:translateY(-1px)}
      .btn.p{background:var(--green);color:#fff}
      .btn.g{background:transparent;border:1px solid var(--line);color:var(--ink)}
      .community{display:flex;gap:10px;justify-content:center;margin-top:22px}
      .ic{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--mut);border:1px solid var(--line);border-radius:999px;padding:7px 15px;transition:border-color .12s,color .12s}
      .ic:hover{color:var(--ink);border-color:#d6d0c7}
      .ic-off{cursor:default}
      .ic-off:hover{color:var(--mut);border-color:var(--line)}
      footer{color:var(--mut);font-size:12px;padding:30px 0 0}
      .powered{display:inline-flex;align-items:center;gap:9px;color:var(--mut);font-size:12.5px}
      .powered img{height:30px;width:auto;display:block;opacity:.95}
    </style>
  </head>

      <h1><em>@task</em> that don't drop.</h1>
      <p class="sub">Durable async tasks — retries, caching and more… all <em>observable</em>.</p>
